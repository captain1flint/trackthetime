<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Candy Quiz - Леденцовая викторина</title>
    <!-- Canvas Confetti для анимации взрыва (правильное имя функции confetti) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 30%, #FFD6A5 60%, #FDE2C4 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Poppins', 'Comic Neue', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            animation: bgFlow 12s infinite alternate;
        }

        @keyframes bgFlow {
            0% {
                background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 30%, #FFD6A5 60%, #FDE2C4 100%);
            }
            100% {
                background: linear-gradient(225deg, #FBC2EB 0%, #A6C1FF 30%, #F5B042 70%, #FFE0A3 100%);
            }
        }

        /* счётчик в левом верхнем углу */
        .candy-counter {
            position: fixed;
            top: 24px;
            left: 24px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,240,0.5);
            z-index: 100;
            transition: transform 0.2s ease;
        }

        .candy-counter span:first-child {
            font-size: 2rem;
            font-weight: bold;
            color: #FFE484;
            text-shadow: 0 2px 5px #b45f1b;
            background: #2c1a0e;
            padding: 0 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        .candy-icon {
            font-size: 2.3rem;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            display: inline-block;
            animation: bounceSoft 1.5s infinite ease;
        }

        @keyframes bounceSoft {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }

        /* главная карточка игры */
        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 72px;
            padding: 30px 28px 42px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255,255,255,0.6);
            transition: all 0.3s ease;
            text-align: center;
            border: 2px solid rgba(255,215,150,0.9);
        }

        /* кнопка старта */
        .start-btn {
            background: linear-gradient(120deg, #ff9a3c, #ff5e7c);
            border: none;
            font-size: 2rem;
            font-weight: bold;
            padding: 18px 40px;
            border-radius: 60px;
            color: white;
            text-shadow: 0 2px 4px #a1220a;
            cursor: pointer;
            box-shadow: 0 10px 0 #a1301a;
            transition: all 0.1s linear;
            font-family: inherit;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #a1301a;
        }

        /* зона вопроса */
        .quiz-area {
            transition: opacity 0.4s ease, transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .question-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b2a1f, #b45f2b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 32px;
            padding: 0 8px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin: 20px 0 25px;
        }

        .option-btn {
            background: #fef2df;
            border: 3px solid #ffbc6e;
            border-radius: 60px;
            padding: 16px 8px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4f2d1a;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(4px);
            box-shadow: 0 5px 0 #d68b3c;
        }

        .option-btn:hover {
            transform: scale(0.97);
            background: #ffe3b5;
            border-color: #ff9f3a;
        }

        .option-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d68b3c;
        }

        /* уведомление (тост) */
        .toast-message {
            background: #2c2c2ce6;
            color: #ffe5b4;
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 15px;
            backdrop-filter: blur(12px);
            transition: 0.2s;
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* финальный блок */
        .final-area {
            animation: glowPulse 0.6s ease;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 24px;
        }

        .win-title {
            font-size: 3rem;
            font-weight: 900;
            color: #FFD966;
            text-shadow: 0 5px 0 #aa5c1c;
        }

        .candy-final-count {
            font-size: 2.5rem;
            background: white;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 80px;
            margin: 15px 0;
            font-weight: bold;
        }

        .sad-face {
            font-size: 5rem;
            filter: drop-shadow(0 4px 6px black);
        }

        .restart-btn {
            background: #ffbe76;
            color: #3c2a1f;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 50px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .restart-btn:hover {
            background: #ffa54d;
            transform: scale(0.96);
        }

        .hide {
            display: none !important;
        }

        button {
            background: none;
            border: none;
        }

        .disabled-click {
            pointer-events: none;
            opacity: 0.7;
        }

        /* плавные переходы */
        .fade-out {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .fade-in {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body>

<div class="candy-counter">
    <span id="scoreValue">0</span>
    <div class="candy-icon">🍬</div>
</div>

<div class="game-container" id="gameContainer">
    <!-- зона кнопки старта -->
    <div id="startScreen">
        <div style="font-size: 1.8rem; font-weight: bold; margin-bottom: 20px;">🍭 Сладкая Викторина 🍬</div>
        <button class="start-btn" id="startGameBtn">🍬 НАЧАТЬ ИГРУ 🍬</button>
    </div>

    <!-- зона викторины (вопросы) -->
    <div id="quizScreen" class="hide">
        <div class="quiz-area" id="quizArea">
            <div class="question-text" id="questionText"></div>
            <div class="options-grid" id="optionsContainer"></div>
            <div id="messageArea" style="min-height: 70px;"></div>
        </div>
    </div>

    <!-- финальная зона -->
    <div id="finalScreen" class="hide"></div>
</div>

<script>
    // ---------- ВОПРОСЫ ----------
    const QUESTIONS = [
        {
            text: "Три месяца зимы",
            options: ["март, апрель, май", "июнь, июль, август", "сентябрь, октябрь, ноябрь", "декабрь, январь, февраль"],
            correctIndex: 3   // четвертый
        },
        {
            text: "Сколько колёс у обычной машины",
            options: ["1", "4", "2", "3"],
            correctIndex: 1   // 4
        },
        {
            text: "Что нужно сейчас сделать",
            options: ["Начать тестировать новую нф", "Завести ещё один баг", "Списать время", "Собрать всех на созвон"],
            correctIndex: 2   // Списать время
        }
    ];

    // DOM элементы
    const startScreenDiv = document.getElementById('startScreen');
    const quizScreenDiv = document.getElementById('quizScreen');
    const finalScreenDiv = document.getElementById('finalScreen');
    const startBtn = document.getElementById('startGameBtn');
    const scoreSpan = document.getElementById('scoreValue');
    const questionTextEl = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const messageArea = document.getElementById('messageArea');
    const quizArea = document.getElementById('quizArea');

    // Состояния игры
    let currentQuestionIndex = 0;      // 0,1,2
    let candyCount = 0;                // текущий счёт
    let gameActive = false;            // находится ли игра в процессе (вопросы активны)
    let waitingForTransition = false;   // блокировка кликов во время анимации/паузы
    let gameFinished = false;           // игра завершена (чтобы не вызывать финал повторно)

    // Обновление счетчика на UI
    function updateScoreUI() {
        scoreSpan.textContent = candyCount;
    }

    // Показать короткое уведомление
    function showMessage(text, isError = false) {
        messageArea.innerHTML = `<div class="toast-message" style="background: ${isError ? '#8b2c1dcc' : '#2c5a2ccc'};">${text}</div>`;
        setTimeout(() => {
            if (messageArea.firstChild) messageArea.firstChild.style.opacity = '0';
            setTimeout(() => {
                if (messageArea.innerHTML.includes(text)) messageArea.innerHTML = '';
            }, 300);
        }, 1200);
    }

    // Плавная смена вопроса (анимация исчезновения/появления)
    async function transitionToNextQuestion(nextQuestionIndex) {
        if (!gameActive || gameFinished) return;
        waitingForTransition = true;
        quizArea.classList.add('fade-out');
        await new Promise(resolve => setTimeout(resolve, 280));
        
        if (!gameActive || gameFinished) {
            quizArea.classList.remove('fade-out');
            waitingForTransition = false;
            return;
        }
        
        currentQuestionIndex = nextQuestionIndex;
        
        if (currentQuestionIndex < QUESTIONS.length) {
            renderCurrentQuestion();
            quizArea.classList.remove('fade-out');
            quizArea.classList.add('fade-in');
            await new Promise(resolve => setTimeout(resolve, 100));
            quizArea.classList.remove('fade-in');
        } else {
            quizArea.classList.remove('fade-out');
        }
        waitingForTransition = false;
    }

    // Отрисовка текущего вопроса
    function renderCurrentQuestion() {
        if (!gameActive || gameFinished) return;
        const q = QUESTIONS[currentQuestionIndex];
        questionTextEl.textContent = q.text;
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.dataset.optIndex = idx;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!gameActive || waitingForTransition || gameFinished) return;
                handleAnswer(idx);
            });
            optionsContainer.appendChild(btn);
        });
        messageArea.innerHTML = '';
    }

    // Обработка ответа (с разным весом для последнего вопроса)
    function handleAnswer(selectedIdx) {
        if (!gameActive || waitingForTransition || gameFinished) return;
        
        const currentQ = QUESTIONS[currentQuestionIndex];
        const isCorrect = (selectedIdx === currentQ.correctIndex);
        const isLast = (currentQuestionIndex === QUESTIONS.length - 1);
        
        // Определяем изменение счёта: для последнего вопроса ±1000, для остальных ±1
        let delta;
        if (isLast) {
            delta = isCorrect ? 1000 : -1000;
        } else {
            delta = isCorrect ? 1 : -1;
        }
        
        candyCount += delta;
        updateScoreUI();
        
        // Уведомление
        if (isCorrect) {
            if (isLast) {
                showMessage(`✅ ПРАВИЛЬНО! +1000 КОНФЕТ 🍬🍬🍬`, false);
            } else {
                showMessage("✅ ПРАВИЛЬНЫЙ ОТВЕТ! +1 конфета 🍬", false);
            }
        } else {
            if (isLast) {
                showMessage(`❌ НЕВЕРНО! -1000 КОНФЕТ 😭`, true);
            } else {
                showMessage("❌ НЕПРАВИЛЬНО! -1 конфета 😢", true);
            }
        }
        
        waitingForTransition = true;
        
        if (isLast) {
            // Третий вопрос — завершаем игру после небольшой паузы
            setTimeout(() => {
                if (gameActive && !gameFinished) {
                    endGameAfterLastAnswer(isCorrect);
                }
                waitingForTransition = false;
            }, 1000);
        } else {
            // Не последний вопрос — переход к следующему
            setTimeout(async () => {
                if (!gameActive || gameFinished) {
                    waitingForTransition = false;
                    return;
                }
                const nextIndex = currentQuestionIndex + 1;
                await transitionToNextQuestion(nextIndex);
                waitingForTransition = false;
            }, 1200);
        }
    }
    
    // Финал игры после ответа на последний вопрос
    async function endGameAfterLastAnswer(isLastAnswerCorrect) {
        if (gameFinished) return;
        gameActive = false;
        gameFinished = true;
        
        // Плавно скрываем викторину
        quizArea.classList.add('fade-out');
        await new Promise(resolve => setTimeout(resolve, 300));
        quizScreenDiv.classList.add('hide');
        
        // Определяем финальное отображение
        if (isLastAnswerCorrect) {
            // ПОБЕДА! Запускаем мощный взрыв (конфетти)
            if (typeof confetti === 'function') {
                confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 }, startVelocity: 30, colors: ['#ffcc33', '#ff9933', '#ff66cc', '#aaffdd'] });
                confetti({ particleCount: 100, spread: 80, origin: { y: 0.7, x: 0.2 }, decay: 0.9 });
                confetti({ particleCount: 100, spread: 80, origin: { y: 0.7, x: 0.8 }, decay: 0.9 });
                setTimeout(() => {
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, startVelocity: 20 });
                }, 150);
            } else {
                console.warn("confetti library not loaded");
            }
            
            const winCandies = candyCount;
            finalScreenDiv.innerHTML = `
                <div class="final-area">
                    <div class="win-title">🎉 ПОБЕДА! 🎉</div>
                    <div style="font-size:2rem; margin-top:10px;">🍬 Выиграно конфет:</div>
                    <div class="candy-final-count">${winCandies} 🍬</div>
                    <button class="restart-btn" id="restartFinalBtn">🍭 Сыграть снова 🍭</button>
                </div>
            `;
        } else {
            // Последний ответ неверный: проверяем итоговый баланс
            if (candyCount < 0) {
                finalScreenDiv.innerHTML = `
                    <div class="final-area">
                        <div class="sad-face">😢😟😭</div>
                        <div style="font-size: 2rem; font-weight: bold; margin: 15px 0; color:#5a2e1a;">НИЧЕГО НЕ ВЫИГРАНО</div>
                        <div style="font-size:1.6rem;">🍬 Ваш баланс: ${candyCount} конфет</div>
                        <button class="restart-btn" id="restartFinalBtn">🍬 Попробовать снова 🍬</button>
                    </div>
                `;
            } else {
                finalScreenDiv.innerHTML = `
                    <div class="final-area">
                        <div style="font-size: 2.8rem; font-weight: bold; background: linear-gradient(45deg,#f09819,#ff6a00); background-clip:text; -webkit-background-clip:text; color:transparent;">ИГРА ЗАВЕРШЕНА</div>
                        <div style="font-size:2rem; margin-top:10px;">🍬 Конфет заработано:</div>
                        <div class="candy-final-count">${candyCount} 🍬</div>
                        <button class="restart-btn" id="restartFinalBtn">🎮 Играть заново 🎮</button>
                    </div>
                `;
            }
        }
        
        finalScreenDiv.classList.remove('hide');
        const restartButton = document.getElementById('restartFinalBtn');
        if (restartButton) {
            restartButton.addEventListener('click', () => {
                fullResetAndRestart();
            });
        }
    }
    
    // Полный сброс и рестарт игры
    function fullResetAndRestart() {
        currentQuestionIndex = 0;
        candyCount = 0;
        gameActive = false;
        waitingForTransition = false;
        gameFinished = false;
        updateScoreUI();
        
        finalScreenDiv.classList.add('hide');
        quizScreenDiv.classList.add('hide');
        startScreenDiv.classList.remove('hide');
        
        if (messageArea) messageArea.innerHTML = '';
        optionsContainer.innerHTML = '';
        quizArea.classList.remove('fade-out', 'fade-in');
    }
    
    // Функция запуска новой игры (по кнопке "Начать игру")
    function initNewGame() {
        currentQuestionIndex = 0;
        candyCount = 0;
        gameActive = true;
        waitingForTransition = false;
        gameFinished = false;
        updateScoreUI();
        
        startScreenDiv.classList.add('hide');
        finalScreenDiv.classList.add('hide');
        quizScreenDiv.classList.remove('hide');
        
        messageArea.innerHTML = '';
        quizArea.classList.remove('fade-out', 'fade-in');
        
        renderCurrentQuestion();
        quizArea.classList.add('fade-in');
        setTimeout(() => {
            if (quizArea) quizArea.classList.remove('fade-in');
        }, 300);
    }
    
    // обработчик кнопки старта
    startBtn.addEventListener('click', () => {
        if (!gameFinished && !gameActive) {
            initNewGame();
        } else {
            fullResetAndRestart();
            initNewGame();
        }
    });
    
    // Дополнительная страховка: если библиотека конфетти не загрузилась, чтобы не было ошибок
    if (typeof confetti !== 'function') {
        window.confetti = function() { console.log("confetti fallback"); };
    }
    
    console.log("Candy quiz ready — последний вопрос ±1000, взрыв работает!");
</script>
</body>
</html>
