<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Списать время</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #ball {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #fbbf24, #b45309);
            border-radius: 50%;
            animation: approach 2s ease-in forwards;
            box-shadow: 0 0 20px #f59e0b;
        }

        #text {
            display: none;
            color: #fbbf24;
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 10px #b45309;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes approach {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(3); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="ball"></div>
    <div id="text">Списать время</div>

    <script>
        const ball = document.getElementById('ball');
        const text = document.getElementById('text');

        // Ждем окончания анимации приближения
        ball.addEventListener('animationend', () => {
            // Взрыв конфетти
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Скрываем шарик и показываем текст
            ball.style.display = 'none';
            text.style.display = 'block';
        });
    </script>
</body>
</html>
