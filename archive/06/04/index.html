<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Списать время</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #87CEEB; /* Небо */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- ПЕЙЗАЖ --- */
        #scenery {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Легкое размытие при зуме для кинематографичности */
            transition: filter 1.5s ease; 
        }

        #scenery.blur {
            filter: blur(5px);
        }

        /* Солнце */
        .sun {
            position: absolute;
            top: 10%;
            right: 15%;
            width: 80px;
            height: 80px;
            background-color: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 50px #FFD700, 0 0 100px #FF8C00;
        }

        /* Облака (простые CSS-формы) */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud1 { top: 20%; left: 10%; width: 120px; height: 40px; }
        .cloud1::before { top: -20px; left: 15px; width: 50px; height: 50px; }
        .cloud1::after { top: -30px; right: 15px; width: 60px; height: 60px; }

        .cloud2 { top: 15%; right: 30%; width: 100px; height: 35px; transform: scale(0.8); }
        .cloud2::before { top: -15px; left: 15px; width: 40px; height: 40px; }
        .cloud2::after { top: -25px; right: 15px; width: 50px; height: 50px; }

        .cloud3 { top: 35%; left: 60%; width: 150px; height: 50px; transform: scale(1.2); opacity: 0.6; }
        .cloud3::before { top: -25px; left: 20px; width: 60px; height: 60px; }
        .cloud3::after { top: -35px; right: 20px; width: 70px; height: 70px; }

        /* Поле */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #7CFC00, #228B22);
            z-index: 2;
        }

        /* Озеро с краю */
        .lake {
            position: absolute;
            bottom: 10%;
            left: -5%;
            width: 35%;
            height: 60%;
            background: linear-gradient(to bottom, #1E90FF, #0000CD);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        /* Деревья на горизонте */
        .trees {
            position: absolute;
            bottom: 30%; /* На границе поля и неба */
            width: 100%;
            font-size: 45px;
            letter-spacing: 15px;
            white-space: nowrap;
            user-select: none;
            z-index: 3;
        }

        /* --- САМОЛЁТ --- */
        #plane-container {
            position: absolute;
            top: 15%;
            left: -400px; /* За экраном */
            width: 350px; /* Размер картинки самолёта */
            animation: flyAcross 5s linear forwards;
            z-index: 10;
        }

        #plane-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes flyAcross {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 600px)); }
        }

        /* --- СИСТЕМА СБРОСА КОРОБКИ --- */
        #box-drop-zone {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            z-index: 5;
        }

        /* Падение */
        #falling-box-container {
            width: 100%;
            height: 100%;
            opacity: 0;
            transform: translateY(calc(-35vh - 50px)); /* Высота самолёта */
            transition: transform 1.2s cubic-bezier(0.6, 0.04, 0.98, 0.33), opacity 0.1s;
        }

        #falling-box-container.dropped {
            opacity: 1;
            transform: translateY(15vh); /* Падает на землю (чуть ниже центра) */
        }

        /* Зум камеры */
        #zoom-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #zoom-wrapper.zoomed {
            transform: scale(3.5) translateY(-20px);
        }

        /* Коробка */
        #box {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .panel {
            position: absolute;
            background-color: #CD853F;
            border: 2px solid #8B4513;
            box-sizing: border-box;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px); /* Текстура картона */
            transition: all 1s ease-out;
        }

        .panel-top    { top: 0;    left: 0; width: 100%; height: 50%; z-index: 3; transform-origin: top center; }
        .panel-bottom { bottom: 0; left: 0; width: 100%; height: 50%; z-index: 3; transform-origin: bottom center; }
        .panel-left   { top: 0;    left: 0; width: 50%; height: 100%; transform-origin: center left; z-index: 2; }
        .panel-right  { top: 0;    right: 0; width: 50%; height: 100%; transform-origin: center right; z-index: 2;}

        /* Текст внутри */
        #text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            color: #fff;
            background-color: #e74c3c;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 900;
            white-space: nowrap;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s;
            z-index: 1;
        }

        /* Анимация распада */
        #box.open .panel-top    { transform: translateY(-50px) rotateX(90deg); opacity: 0; }
        #box.open .panel-bottom { transform: translateY(50px) rotateX(-90deg); opacity: 0; }
        #box.open .panel-left   { transform: translateX(-50px) rotateY(-90deg); opacity: 0; }
        #box.open .panel-right  { transform: translateX(50px) rotateY(90deg); opacity: 0; }

        #box.open #text {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

    <div id="scenery">
        <div class="sun"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="ground">
            <div class="lake"></div>
        </div>
        <div class="trees">
            🌳 🌲 🌳 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 🌲 🌳 🌲 🌲 &nbsp;&nbsp;&nbsp;&nbsp; 🌳
        </div>
    </div>

    <div id="plane-container">
        <img src="zknd_khmf_211025.png" alt="Самолёт">
    </div>

    <div id="box-drop-zone">
        <div id="falling-box-container">
            <div id="zoom-wrapper">
                <div id="box">
                    <div id="text">Списать время</div>
                    <div class="panel panel-top"></div>
                    <div class="panel panel-bottom"></div>
                    <div class="panel panel-left"></div>
                    <div class="panel panel-right"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fallingContainer = document.getElementById('falling-box-container');
            const zoomWrapper = document.getElementById('zoom-wrapper');
            const box = document.getElementById('box');
            const scenery = document.getElementById('scenery');

            // 1. Самолёт по центру экрана примерно на 2.3-2.4 секунде. Сбрасываем коробку.
            setTimeout(() => {
                fallingContainer.classList.add('dropped');
            }, 2400);

            // 2. Коробка приземляется (на это уходит 1.2 сек). Запускаем зум и размываем фон.
            setTimeout(() => {
                zoomWrapper.classList.add('zoomed');
                scenery.classList.add('blur'); // Фокус только на коробке
            }, 3600);

            // 3. Зум завершается, коробка разваливается, показывая текст.
            setTimeout(() => {
                box.classList.add('open');
            }, 5100);
        });
    </script>
</body>
</html>
